name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
      - name: Run flake8
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  test-imports:
    name: Test Imports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch numpy Pillow transformers torchvision
      - name: Test imports (mimic ComfyUI loader)
        run: |
          # Load __init__.py via spec_from_file_location, the way ComfyUI's
          # load_custom_node does. A plain `from nodes import ...` would put
          # the repo root on sys.path and silently mask absolute-import bugs
          # that break the package when ComfyUI loads it.
          python - <<'PY'
          import importlib.util, sys, pathlib
          repo = pathlib.Path('.').resolve()
          spec = importlib.util.spec_from_file_location(
              "ComfyUI-Whisker-Nodes",
              repo / "__init__.py",
              submodule_search_locations=[str(repo)],
          )
          mod = importlib.util.module_from_spec(spec)
          sys.modules[spec.name] = mod
          spec.loader.exec_module(mod)
          print('Import test passed:', list(mod.NODE_CLASS_MAPPINGS.keys()))
          PY
